{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <title>GarouSchool</title>
</head>
<body>

<!-- TOPBAR MOBILE (logo + avatar profil en haut a droite, visible uniquement sur petit ecran) -->
<div class="topbar-mobile">
    <h1 class="topbar-logo">Garou<span>School</span></h1>
    <a href="{% url 'profil' %}" class="topbar-avatar">AA</a>
</div>

<nav>
    <div class="logo">
        <h1>Garou<span>School</span></h1>
    </div>
    <hr class="separateur">
    <div class="nav-menu">
        <p class="title">MENU PRINCIPAL</p>
        <ul>
            <li><a class="links" href="{% url 'dash' %}"><i class="bi bi-house-door-fill"></i> Tableau de bord</a></li>
            <li><a class="links" href="{% url 'note' %}"><i class="bi bi-bar-chart-fill"></i> Notes & performance</a></li>
            <li><a class="links" href="{% url 'paiement1' %}"><i class="bi bi-credit-card-2-back-fill"></i> Paiements</a></li>
            <li><a class="links" href="{% url 'documents' %}"><i class="bi bi-folder-fill"></i> Documents</a></li>
        </ul>
        <p class="title">AUTRES</p>
        <ul>
            <li><a class="links" href="{% url 'notifications' %}"><i class="bi bi-bell-fill"></i> Notifications</a></li>
            <li><a class="links" href="{% url 'parametre' %}"><i class="bi bi-gear-fill"></i> Parametres</a></li>
        </ul>
    </div>
    <a href="{% url 'profil' %}" class="user-card text-decoration-none">
        <div class="avatar">AA</div>
        <div class="user-info">
            <span class="user-name">Adamou Abba</span>
            <span class="user-role">Etudiant, L2 info</span>
        </div>
    </a>
</nav>

{% block content %}
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{% static 'js/script.js' %}"></script>

</body>
</html>
