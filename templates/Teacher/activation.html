<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Activation du compte</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f7fa;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card-activation{
            width:100%;
            max-width:500px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,.08);
        }

    </style>

</head>
<body>

<div class="card-activation">

    <h2 class="text-center mb-4">
        Activation du compte
    </h2>

    {% if erreur %}
        <div class="alert alert-danger">
            {{ erreur }}
        </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Mot de passe
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                required
            >

        </div>

        <div class="mb-4">

            <label class="form-label">
                Confirmer le mot de passe
            </label>

            <input
                type="password"
                name="confirmation"
                class="form-control"
                required
            >

        </div>

        <button
            type="submit"
            class="btn btn-primary w-100"
        >
            Activer mon compte
        </button>

    </form>

</div>

</body>
</html>
